# 模型与 API 配置
api:
  endpoint: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
  key_file: "APIKey.txt"          # 相对项目根目录
  deepseek_endpoint: "https://api.deepseek.com/chat/completions"
  deepseek_key_file: "DeepSeekAPIKey.txt"
  timeout_seconds: 60
  deepseek_timeout_seconds: 120
  deepseek_thinking_timeout_seconds: 300

models:
  candidate_model: "glm-4-flash"   # 批量候选生成（快速便宜）
  polish_model: "glm-4-flash"      # 润色模型
  glm_retry_model: "glm-4-plus"     # GLM 低分重试升级模型
  deepseek_model: "deepseek-v4-pro" # DeepSeek 生成模型
  deepseek_reasoning_effort: "high" # DeepSeek 思考模式强度
  deepseek_thinking_min_tokens: 16384 # DeepSeek 思考模式最小输出 token 预算

generation:
  candidates_per_bar: 10           # 每小节生成候选数
  max_retries: 3                   # 字数不匹配时重试次数
  temperature: 0.9

# 评分权重（总和 = 1.0）
scoring:
  tone_weight: 0.45                # 协音
  semantic_weight: 0.20            # 语义保持
  naturalness_weight: 0.15         # 口语自然度
  phrasing_weight: 0.10            # 分句匹配
  rhyme_style_weight: 0.10         # 韵脚/风格

# 粤语九声 → 0243 映射
tone_mapping:
  # 粤语声调编号 → 0243 类别
  1: 3    # 阴平 → 3
  2: 4    # 阴上 → 4
  3: 4    # 阴去 → 4
  4: 0    # 阳平 → 0
  5: 0    # 阳上 → 0
  6: 2    # 阳去 → 2
  7: 3    # 上阴入 → 3
  8: 4    # 下阴入 → 4
  9: 0    # 阳入 → 0
